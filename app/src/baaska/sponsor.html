<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,slnt@8..144,700,-10&display=swap"
        rel="stylesheet">
    <title>Ивээн тэтгэгчид</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #fff;
            font-family: Arial, sans-serif;
        }

        .sponsors-section {
            width: 100%;
            overflow: hidden;
            background: #21c7f4;
            padding: 48px 0 56px;
        }

        .container {
            width: min(100%, 1440px);
            margin: 0 auto;
        }

        .title {
            font-family: 'Roboto Flex', sans-serif;
            font-weight: 700;
            font-style: italic;
            font-size: 96px;
            line-height: 112px;
            text-transform: uppercase;
            text-align: center;
            color: #fff;
            margin: 0 0 34px 0;
        }

        /* =========================
       ALHAN HEE
    ========================= */
        .pattern-row {
            width: 100%;
            overflow: visible;
            height: clamp(34px, 4.5vw, 64px);
            opacity: 0.7;
            position: relative;
            margin: 0 0 34px 0;
        }

        .pattern-track {
            display: flex;
            width: max-content;
            position: relative;
            z-index: 1;
        }

        .pattern-segment {
            flex: 0 0 auto;
            height: clamp(34px, 4.5vw, 64px);
            width: 1440px;
        }

        .pattern-svg {
            width: 100%;
            height: 100%;
            display: block;
            overflow: visible;
        }

        .pattern-svg .deer-stroke {
            fill: none;
            stroke: white;
            stroke-width: 2;
            stroke-miterlimit: 10;
            opacity: 0.22;
        }

        .pattern-svg .deer-highlight {
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.95;
            filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.8));
        }

        .pattern-svg .guide-dot {
            fill: #ffffff;
            opacity: 0;
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.95))
                drop-shadow(0 0 9px rgba(255, 255, 255, 0.7));
            pointer-events: none;
        }

        .pattern-img {
            flex: 0 0 auto;
            height: clamp(34px, 4.5vw, 64px);
            width: auto;
            display: block;
        }

        /* =========================
       LOGO MARQUEE
    ========================= */
        .logo-marquee {
            width: 100%;
            overflow: hidden;
            position: relative;
            margin: 0 0 34px 0;
        }

        .logo-track {
            display: flex;
            align-items: center;
            width: max-content;
            animation: marqueeMove 15s linear infinite;
            gap: clamp(20px, 2.2vw, 36px);
            will-change: transform;
        }

        .logo-item {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            height: clamp(44px, 6vw, 72px);
        }

        .logo-item img {
            display: block;
            height: 100%;
            width: auto;
            max-width: none;
            object-fit: contain;
        }

        .logo-item.small img {
            height: clamp(42px, 5.5vw, 68px);
        }

        .logo-item.large img {
            height: clamp(48px, 6.2vw, 76px);
        }

        /* =========================
       ANIMATION
    ========================= */
        @keyframes marqueeMove {
            from {
                transform: translateX(-50%);
            }

            to {
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .sponsors-section {
                padding: 30px 0 36px;
            }

            .title {
                margin-bottom: 22px;
            }
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dotLoopDurationMs = 10000;
            const svgNs = 'http://www.w3.org/2000/svg';
            const rows = document.querySelectorAll('.pattern-row');

            rows.forEach((row) => {
                const strokes = row.querySelectorAll('.deer-stroke');
                const guides = [];

                strokes.forEach((path) => {
                    const length = path.getTotalLength();
                    const startPoint = path.getPointAtLength(0);
                    const endPoint = path.getPointAtLength(length);
                    const isNaturalLeftToRight = endPoint.x >= startPoint.x;
                    const isOuterStroke = !path.classList.contains('second');

                    const highlight = path.cloneNode(false);
                    highlight.removeAttribute('stroke');
                    highlight.removeAttribute('stroke-width');
                    highlight.setAttribute('class', 'deer-highlight');
                    path.ownerSVGElement.appendChild(highlight);

                    const startOffset = isNaturalLeftToRight ? length : -length;
                    highlight.style.strokeDasharray = String(length);
                    highlight.style.strokeDashoffset = String(startOffset);

                    const dot = document.createElementNS(svgNs, 'circle');
                    dot.setAttribute('class', 'guide-dot');
                    dot.setAttribute('r', '4.2');
                    path.ownerSVGElement.appendChild(dot);

                    guides.push({
                        path,
                        dot,
                        highlight,
                        length,
                        isNaturalLeftToRight,
                        isOuterStroke,
                        startOffset,
                    });
                });

                requestAnimationFrame(() => {
                    const startAt = performance.now();
                    const animateGuides = (now) => {
                        const elapsed = (now - startAt) % dotLoopDurationMs;
                        const t = elapsed / dotLoopDurationMs;

                        guides.forEach(({ path, dot, highlight, length, isNaturalLeftToRight, isOuterStroke, startOffset }) => {
                            const baseProgress = isNaturalLeftToRight ? t : 1 - t;
                            const pathProgress = isOuterStroke ? 1 - baseProgress : baseProgress;
                            const point = path.getPointAtLength(pathProgress * length);
                            const revealStartOffset = isOuterStroke ? -startOffset : startOffset;
                            const currentOffset = revealStartOffset * (1 - t);

                            dot.setAttribute('cx', point.x.toFixed(2));
                            dot.setAttribute('cy', point.y.toFixed(2));
                            dot.style.opacity = t > 0 ? '1' : '0';
                            highlight.style.strokeDashoffset = currentOffset.toFixed(2);
                        });

                        requestAnimationFrame(animateGuides);
                    };

                    requestAnimationFrame(animateGuides);
                });
            });
        });
    </script>
